# Phase 1 instruments — commodities and indices via yfinance
# ig_epic fields verified against IG API (DFB = undated Daily Funded Bet)

instruments:
  - symbol: "GC=F"
    name: Gold
    asset_class: commodity
    timeframe: 1d
    source: yfinance
    session_timezone: America/New_York
    session_open: "18:00"
    session_close: "17:00"
    adjusted_prices: false
    ig_epic: "CS.D.USCGC.TODAY.IP"   # Spot Gold, undated DFB
    ig_sentiment_id: "GC"
    ig_price_factor: 1               # IG and Yahoo both quote in USD/oz
    ig_min_size: 1.0

  - symbol: "CL=F"
    name: Crude Oil (WTI)
    asset_class: commodity
    timeframe: 1d
    source: yfinance
    session_timezone: America/New_York
    session_open: "18:00"
    session_close: "17:00"
    adjusted_prices: false
    ig_epic: "CC.D.CL.USS.IP"        # Oil - US Crude, undated DFB
    ig_sentiment_id: "CL"
    ig_price_factor: 100              # Yahoo USD/barrel → IG cents/barrel

